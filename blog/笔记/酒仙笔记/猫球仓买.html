async function 输入(content,id,e){
    if(Array.isArray(content)){
        content=content[Math.floor(Math.random()*content.length)];
    }
    if(e){
        if(e.innerHTML==" - 对话"){
            e.outerHTML="";
        }
        else{
            e.outerHTML="<b>"+e.innerHTML+"</b><br><br>";
            document.querySelectorAll('#'+id+' a[onclick*="输入"],#'+id+' .del,#'+id+' a[onclick*="关闭"],#'+id+' a[onclick*="选择"]').forEach(el=>el.remove());
        }
    }
    
    const output=document.getElementById(id);
    // output.innerHTML='';
    const parts=content.split(/(\{[^}]+\})/).filter(part=>part!=='');

    for(const part of parts){
    if(part.startsWith('{')&&part.endsWith('}')){
    output.insertAdjacentHTML('beforeend',part.slice(1,-1));
    }else{await typeCharacters(part,output);}}

    }
    async function typeCharacters(text,element){
    const textNode=document.createTextNode('');
    element.appendChild(textNode);

    for(const char of text){
    await new Promise(resolve=>setTimeout(resolve,70));
    textNode.data+=char;
    }
}

    if(当前=="x"){
        当前=o;
        document.getElementById("对话标题").innerHTML=当前;
        o=0;
        document.getElementById("弹窗").style="";
    }
    if(Array.isArray(酒[当前][2][o])){输入(酒[当前][2][o][Math.floor(Math.random()*酒[当前][2][o].length)],"对话",e);}
    else{输入(酒[当前][2][o],"对话",e);}
}

}

function 隐藏酒单(){
    let o=document.getElementById("隐藏酒单").value;
    document.querySelectorAll('#开场白 a[onclick*="输入"],#开场白 .del').forEach(el=>el.remove());
    document.getElementById("开场白").insertAdjacentHTML('beforeend',"<b> - "+o+"</b>");
    if(酒单.indexOf(o)!=-1){
        输入("{<br><br>}你说的这个，酒单里已经有了。{<br><br>}"+按钮('开篇','对话'),"开场白");
    }else if(酒[o]){
        dy=`<fieldset class="酒 ${酒[o][0]}" onclick="选择(${o})"><legend>${o}</legend>${酒[o][1]}</fieldset>`+dy;
        document.getElementById("酒单").innerHTML=dy;
        酒单.push(o);
        输入("{<br><br>}好的，已经添加进酒单了。{<br><br>}"+按钮('开篇','对话'),"开场白");

        输入("{<br><br>}抱歉，这里没有叫这个名字的酒。"+通用["隐藏酒单_输入"],"开场白");
    }
}
